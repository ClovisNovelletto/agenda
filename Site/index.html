<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H2U Agenda</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }
    header {
      padding: 60px 20px;
    }
    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      color: #cbd5f5;
    }
    .buttons {
      margin-top: 30px;
    }
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .primary {
      background: #22c55e;
      color: #000;
    }
    .secondary {
      background: #3b82f6;
      color: #fff;
    }
    footer {
      margin-top: 80px;
      padding: 20px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <header>
    <h1>H2U Agenda</h1>
    <p>Organize sua agenda, alunos e financeiro de forma simples e eficiente.</p>

    <div class="buttons">
      <a href="https://app.h2uagenda.com.br" class="btn primary">Entrar no Sistema</a>
      <a href="../H2u Agenda - Manual Do Usuário.pdf" class="btn secondary">Abrir Manual</a>
    </div>
  </header>

  <footer>
    © 2026 H2U Agenda - Todos os direitos reservados
  </footer>
</body>
</html>
