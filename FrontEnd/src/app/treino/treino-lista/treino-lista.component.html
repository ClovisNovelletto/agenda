
<div class="page" >

  <div class="filtros">

    <mat-form-field appearance="fill">
      <mat-label>Pesquisar</mat-label>
      <input matInput [(ngModel)]="filtroTexto" (keyup.enter)="aplicarFiltro()" />
      <button mat-icon-button matSuffix (click)="aplicarFiltro()">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Status</mat-label>
      <mat-select [(value)]="filtroStatus" (selectionChange)="aplicarFiltro()">
        <mat-option value="Todos">Todos</mat-option>
        <mat-option value="Ativos">Ativos</mat-option>
        <mat-option value="Inativos">Inativos</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="agenda-layout" >
          <!-- Sidebar Treinos -->


        <div class="sidebar">

        <div class="sidebar-header">Treinos</div>
        <div class="aluno-lista">

          <div *ngFor="let treino of treinosFiltrados; trackBy: trackByTreinoId"
            (click)="selecionarTreino(treino)"
            class="treino" [class.ativo]="treinoSelecionado!.id === treino.id">

            <mat-checkbox
              [checked]="treinoSelecionado?.id === treino.id">
              {{ treino.treino }}
            </mat-checkbox>

          </div>        
          <div class="empty" *ngIf="!carregandoTreinos && treinos.length === 0">
              Nenhum Treino.
          </div>
        </div>
    
      </div>
    
      <main class="content">

        <div class="tabela-container">

          <table mat-table [dataSource]="[]" class="tabela-header">
            <ng-container matColumnDef="exe">
                <th mat-header-cell *matHeaderCellDef>Exercício</th>
            </ng-container>

            <ng-container matColumnDef="ser">
                <th mat-header-cell *matHeaderCellDef>Série</th>
            </ng-container>

            <ng-container matColumnDef="tem">
                <th mat-header-cell *matHeaderCellDef>Min.</th>
            </ng-container>

            <ng-container matColumnDef="pes">
                <th mat-header-cell *matHeaderCellDef>Kg</th>
            </ng-container>
             <!-- 
            <ng-container matColumnDef="ord">
                <th mat-header-cell *matHeaderCellDef>Ord</th>
            </ng-container>
            -->

            <tr mat-header-row *matHeaderRowDef="['exe','ser', 'tem', 'pes']" style="height: 32px !important;"></tr>
          </table>

          <div class="tabela-wrap" *ngIf="treinoSelecionado">
            <div class="loading" *ngIf="carregandoTreinosItems">
              <mat-progress-spinner mode="indeterminate" diameter="32"></mat-progress-spinner>
            </div>

            <table mat-table 
                    [dataSource]="dataSource"
                    cdkDropList
                    (cdkDropListDropped)="drop($event)"
                    *ngIf="!carregandoTreinosItems">  

                <ng-container matColumnDef="exe">
                    <td mat-cell *matCellDef="let row" class="corFonte">
                    {{ row?.exercicio || '—' }} 
                    </td>
                </ng-container>

                <ng-container matColumnDef="ser">
                    <td mat-cell *matCellDef="let row" class="corFonte">
                      {{ row?.serie + 'x' + row.repeticao}} 
                    </td>
                </ng-container>

                <ng-container matColumnDef="tem">
                    <td mat-cell *matCellDef="let row" class="corFonte">
                    {{ row.tempo || '—' }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="pes">
                    <td mat-cell *matCellDef="let row" class="corFonte">
                    {{ row.peso || '—' }}
                    </td>
                </ng-container>

                <!--
                <ng-container matColumnDef="ordem">
                    <td mat-cell *matCellDef="let row" class="corFonte">
                    <mat-icon cdkDragHandle>drag_indicator</mat-icon>
                    </td>
                </ng-container>
                -->

                <tr style="min-height: 30px!important; height: 30px!important;"
                  mat-row
                  cdkDrag
                  *matRowDef="let row; columns: displayedColumns;"
                  (click)="treinoItemEditar(row)">
                </tr>
              
            </table>
            
            <div class="empty" *ngIf="!carregandoTreinos && dataSource.data.length === 0" >
              Treino sem itens.
            </div>

            
          </div>
        </div>
      </main>
    </div>
  </div>

    <div class="fab-btnAddT">
      <button mat-fab class="btn-float-menu" style="left: 80px; background-color: #0ca22f;"
        (click)="treinoNovo()" aria-label="Novo Treino">
        <mat-icon>add</mat-icon>
      </button>
    </div>  
    <div class="fab-btnEditT">
      <button mat-fab class="btn-float-menu" style="left: 40px; background-color: #f37d34;"
        (click)="treinoEditar(treinoSelecionado)" aria-label="Treino Editar">
        <mat-icon>edit</mat-icon>
      </button>
    </div>

    <div class="fab-btnAddI">
    <button mat-fab class="btn-float-menu" style="right: 20px; background-color: #0ca22f;" (click)="treinoItemNovo()">
      <mat-icon>add</mat-icon>
    </button>
  </div>
</div>
