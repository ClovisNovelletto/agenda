<mat-toolbar color="primary" style="margin-bottom: 10px; margin-top: 5px;">
  <button mat-icon-button style="display: flex; width: 20px !important; height: 20px !important; align-items: center !important; justify-content: center !important; background-color: black; padding: 7px; margin-right: 10px;" (click)="fechar()">
    <mat-icon style="display: flex; align-items: center !important; justify-content: center !important;">arrow_back</mat-icon>
  </button>
  <span style="font-size: 16px !important; padding: 2px;">Cadastro de Exercícios</span>
</mat-toolbar>

<div style="margin-bottom: 25px; margin-left: 5px;" class="form-wrapper">
  <form *ngIf="form" [formGroup]="form" (ngSubmit)="salvar()">


    <mat-form-field appearance="fill" style="margin-left: 3px; margin-bottom: 5px; width: 80%;">
      <mat-label>Treino</mat-label>
      <input
        type="text"
        matInput
        [disabled]="true"
        [readonly]="true"
        [formControl]="treinoCtrl"
        [matAutocomplete]="autoTreino"
        (blur)="onTreinoBlur()">
      <mat-autocomplete
        #autoTreino="matAutocomplete"
        (optionSelected)="onTreinoSelecionado($event)">
        <mat-option *ngFor="let treino of treinosFiltrados" [value]="treino.descricao">
          {{ treino.descricao }} 
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>

    <mat-form-field appearance="fill" style="margin-left: 3px; margin-bottom: 5px; width: 80%;" >
      <mat-label>Exercício</mat-label>
      <input matInput
             type="texto"
             formControlName="exercicio"
             (blur)="onValorBlur()"/>
    </mat-form-field>
    
    <mat-form-field appearance="fill" style="margin-left: 3px; margin-bottom: 5px; width: 80%;">
      <mat-label>Série</mat-label>

      <input matInput
             type="number"
             formControlName="serie"
             step="1"
             min="0"
             (blur)="onValorBlur()"/>
    </mat-form-field>

    <mat-form-field appearance="fill" style="margin-left: 3px; margin-bottom: 5px; width: 80%;">
      <mat-label>Repetição</mat-label>

      <input matInput
             type="number"
             formControlName="repeticao"
             step="1"
             min="0"
             (blur)="onValorBlur()"/>
    </mat-form-field>

    <mat-form-field appearance="fill" style="margin-left: 3px; margin-bottom: 5px; width: 80%;">
      <mat-label>Peso KG</mat-label>
      <input matInput
             type="number"
             formControlName="peso"
             step="1"
             min="0"
             (blur)="onValorBlur()"/>
    </mat-form-field>

    <mat-form-field appearance="fill" style="margin-left: 3px; margin-bottom: 5px; width: 80%;">
      <mat-label>Tempo Minuto</mat-label>
      <input matInput
             type="number"
             formControlName="tempo"
             step="1"
             min="0"
             (blur)="onValorBlur()"/>
    </mat-form-field>

    <div>
      <button mat-raised-button type="submit" [disabled]="form.invalid || form.pristine" class="btn-salvar">
        Salvar
      </button>
    </div>
  </form>
</div>
