
<div class="page" >

  <div class="filtros">

    <span class="titulo">Treinos do Aluno</span>


    <!-- seletor de mês (apenas mês/ano) -->

    <mat-dialog-content >
      <mat-form-field appearance="fill">
        <mat-label>Mês Filtro:</mat-label>
        <mat-select 
          [(value)]="mesSelecionadoLabel" 
          (selectionChange)="onMonthSelected($event)">
          <mat-option *ngFor="let mes of meses" [value]="mes">
            {{ mes.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </mat-dialog-content>
    <span class="spacer"></span>
  </div>


  <div class="agenda-layout" >
    <!-- Sidebar Alunos -->
    <aside class="sidebar">

      <div class="sidebar-header">Alunos</div>

      <div class="aluno-lista">
        
        <div *ngFor="let aluno of alunos; trackBy: trackByAlunoId"
            
             class="aluno" [class.ativo]="alunoSelecionado!.id === aluno.id">
          <mat-checkbox             
             (change)="selecionarAluno(aluno)"
              [checked]="alunoSelecionado!.id === aluno.id">
              {{ aluno.nome }} 
          </mat-checkbox>
        </div>  
        <div class="empty" *ngIf="!carregandoAlunos && alunos.length === 0">
            Nenhum aluno ativo.
        </div>
      </div>
    
    </aside>


    <main class="content">

      <div class="tabela-container">
        <table mat-table [dataSource]="[]" class="tabela-header">
            <ng-container matColumnDef="treino">
                <th mat-header-cell *matHeaderCellDef>Treino</th>
            </ng-container>

            <ng-container matColumnDef="dataini">
                <th mat-header-cell *matHeaderCellDef>Início</th>
            </ng-container>

            <ng-container matColumnDef="datafim">
                <th mat-header-cell *matHeaderCellDef>Fim</th>
            </ng-container>

            <ng-container matColumnDef="ativo">
                <th mat-header-cell *matHeaderCellDef>Ativo</th>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="['treino','dataini','datafim', 'ativo']" style="height: 32px !important;"></tr>
        </table>
      
      <div class="tabela-wrap" *ngIf="alunoSelecionado">
        <div class="loading" *ngIf="carregandoAlunosTreinos">
          <mat-progress-spinner mode="indeterminate" diameter="32"></mat-progress-spinner>
        </div>

        <table mat-table 
              [dataSource]="dataSource"
              cdkDropList
              (cdkDropListDropped)="drop($event)"
              *ngIf="!carregandoAlunosTreinos">

            <ng-container matColumnDef="treino">
                <td mat-cell *matCellDef="let row" class="corFonte">
                {{ row?.treino }} 
                </td>
            </ng-container>

            <ng-container matColumnDef="dataini">
                <td mat-cell *matCellDef="let row" class="corFonte">
                <span *ngIf="row?.dataini"> 
                  {{ toDate(row?.dataini) | date:'dd/MM/yy' }} 
                </span> 
                </td>
            </ng-container>

            <ng-container matColumnDef="datafim">
                <td mat-cell *matCellDef="let row" class="corFonte">
                <span *ngIf="row?.datafim"> 
                  {{ toDate(row?.datafim) | date:'dd/MM/yy' }} 
                </span> 
                </td>
            </ng-container>

            <ng-container matColumnDef="ativo">
                <td mat-cell *matCellDef="let row" class="corFonte">
                
                <span class="status" [ngClass]="row.ativo ? 'ativo' : 'inativo'">
                  <ng-container [ngSwitch]="row.ativo">
                    <span *ngSwitchCase="true">✅</span>
                    <span *ngSwitchCase="false">❌</span>
                  </ng-container>
                </span>   

                </td>
            </ng-container>



            <tr style="min-height: 30px!important; height: 30px!important;"
                mat-row
                cdkDrag
                [cdkDragStartDelay]="{ touch: 200, mouse: 0 }"
                *matRowDef="let row; columns: displayedColumns;"
                (click)="alunoTreinosEditar(row)">
            </tr>
          
        </table>
        
        <div class="empty" *ngIf="!carregandoAlunosTreinos && dataSource.data.length === 0" >
          Aluno sem treino.
        </div>

      </div>
    </div>
    </main>
  </div>

  <div class="fab-btnAdd">
    <button mat-fab class="btn-float-menu" style="right: 20px; background-color: #0ca22f;" (click)="novoAlunosTreinos()">
      <mat-icon>add</mat-icon>
    </button>
  </div>  
</div>
